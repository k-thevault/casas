name: Vigia de Casas

on:
  schedule:
    # Segunda, 15:00 UTC = meio-dia em Brasília. O GitHub Actions só entende UTC.
    - cron: "0 15 * * 1"
  workflow_dispatch: {}   # permite rodar na mão pelo botão "Run workflow"

jobs:
  vigia:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Instalar o Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Procurar novidades
        id: busca
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          set -o pipefail
          claude -p "$(cat prompt-vigia.txt)" \
            --allowedTools "WebSearch,WebFetch" \
            > resultado.txt
          # Uma busca vazia quase sempre significa que algo falhou, não que não há casas.
          if [ ! -s resultado.txt ]; then
            echo "O Claude não devolveu nada." >&2
            exit 1
          fi
          echo "chars=$(wc -c < resultado.txt)" >> "$GITHUB_OUTPUT"

      - name: Mandar no WhatsApp
        if: success()
        env:
          EVOLUTION_API_KEY: ${{ secrets.EVOLUTION_API_KEY }}
          WHATSAPP_TO: ${{ secrets.WHATSAPP_TO }}
        run: |
          python3 - <<'PY'
          import json, os, urllib.request
          texto = open("resultado.txt", encoding="utf-8").read().strip()
          # O WhatsApp corta mensagens muito longas; o prompt já pede ~1500,
          # mas se passar, cortamos aqui em vez de perder a mensagem inteira.
          if len(texto) > 3500:
              texto = texto[:3400] + "\n\n[…cortado — a lista veio longa esta semana]"
          req = urllib.request.Request(
              "https://evolutionapi.suportesam.com/message/sendText/k",
              method="POST",
              data=json.dumps({"number": os.environ["WHATSAPP_TO"], "text": texto}).encode(),
              headers={"apikey": os.environ["EVOLUTION_API_KEY"],
                       "Content-Type": "application/json"},
          )
          with urllib.request.urlopen(req, timeout=60) as r:
              print("enviado:", json.loads(r.read()).get("status"))
          PY

      - name: Avisar se a busca falhou
        if: failure()
        env:
          EVOLUTION_API_KEY: ${{ secrets.EVOLUTION_API_KEY }}
          WHATSAPP_TO: ${{ secrets.WHATSAPP_TO }}
        run: |
          python3 - <<'PY'
          import json, os, urllib.request
          run = f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}"
          texto = ("⚠️ O Vigia de Casas rodou hoje mas falhou — não é que não haja novidades, "
                   "é que a busca não completou.\n\nDetalhes: " + run)
          req = urllib.request.Request(
              "https://evolutionapi.suportesam.com/message/sendText/k",
              method="POST",
              data=json.dumps({"number": os.environ["WHATSAPP_TO"], "text": texto}).encode(),
              headers={"apikey": os.environ["EVOLUTION_API_KEY"],
                       "Content-Type": "application/json"},
          )
          urllib.request.urlopen(req, timeout=60)
          PY

      - name: Guardar o resultado
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vigia-semanal
          path: resultado.txt
          if-no-files-found: ignore
